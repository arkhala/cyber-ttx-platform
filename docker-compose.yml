version: '3.8'
services:
  ttx:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - XAI_API_KEY=${XAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - ENABLE_AI_BRANCHING=true
      - ENABLE_CSIRT=true
      - ENABLE_DOCGEN=true
      - STRICT_REPRODUCIBILITY=true
      - SINGLE_FACILITATOR_MVP=true
    volumes:
      - ./exports:/app/exports
      - ./exercises.db:/app/exercises.db
    restart: unless-stopped